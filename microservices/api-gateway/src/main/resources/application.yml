server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # Vehicle Service Routes
        - id: vehicle-service
          uri: lb://vehicle-service
          predicates:
            - Path=/api/vehicles/**
          filters:
            - StripPrefix=0
        
        # Specification Service Routes
        - id: specification-service
          uri: lb://specification-service
          predicates:
            - Path=/api/specifications/**
          filters:
            - StripPrefix=0
        
        # Comparison Service Routes
        - id: comparison-service
          uri: lb://comparison-service
          predicates:
            - Path=/api/compare/**
          filters:
            - StripPrefix=0

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

